<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENT OPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700&family=IBM+Plex+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  button { font: inherit; cursor: pointer; }

  /* ================= テーマ変数 ================= */
  body[data-theme="clay"], body[data-theme="office"], body[data-theme="company"] {
    --bg: #f6efe3;
    --text: #5b4a3a;
    --dim: #a08d78;
    --card-hi: #fffdf8;
    --card-lo: #f1e7d8;
    --sh-dark: rgba(180, 155, 120, .38);
    --sh-light: rgba(255, 255, 255, .95);

    --c-coding:     #58c98d;
    --c-reading:    #5cb8ec;
    --c-searching:  #b18ae8;
    --c-running:    #f0a05e;
    --c-delegating: #ef8ab5;
    --c-planning:   #e5c04e;
    --c-thinking:   #9aa6c4;
    --c-waiting:    #ee7d7d;
    --c-idle:       #bfae97;
    --c-ended:      #c4bcb0;

    font-family: "Zen Maru Gothic", "Baloo 2", sans-serif;
  }
  body[data-theme="ops"] {
    --bg: #07090b;
    --text: #d7dee5;
    --dim: #5c6a76;
    --card-hi: #131a20;
    --card-lo: #0c1014;
    --sh-dark: rgba(0, 0, 0, .6);
    --sh-light: rgba(255, 255, 255, .04);

    --c-coding:     #3dd68c;
    --c-reading:    #4cc3ff;
    --c-searching:  #ffb454;
    --c-running:    #ff8a5c;
    --c-delegating: #ff5c8a;
    --c-planning:   #ffd866;
    --c-thinking:   #8fa3b8;
    --c-waiting:    #ff5c5c;
    --c-idle:       #45525e;
    --c-ended:      #2c353e;

    font-family: "Zen Kaku Gothic New", sans-serif;
  }

  body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background .4s; }

  /* ================= 背景 ================= */
  /* clay: ゆらゆら浮かぶパステルの雲ブロブ */
  #blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  #blobs i { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .5; animation: drift 16s ease-in-out infinite alternate; }
  #blobs i:nth-child(1) { width: 420px; height: 420px; background: #ffd9e8; top: -120px; left: -80px; }
  #blobs i:nth-child(2) { width: 380px; height: 380px; background: #d3ecff; bottom: -100px; right: -60px; animation-delay: -5s; }
  #blobs i:nth-child(3) { width: 300px; height: 300px; background: #e2ffd9; top: 40%; left: 55%; animation-delay: -10s; }
  @keyframes drift { to { transform: translate(50px, 30px) scale(1.12); } }
  body[data-theme="ops"] #blobs { display: none; }
  /* ops: CRT スキャンライン */
  body[data-theme="ops"]::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background:
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.13) 2px 4px),
      radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(0,0,0,.5) 100%);
  }

  /* ================= ヘッダー ================= */
  /* ヘッダーは全テーマ共通 */
  header { position: relative; z-index: 3; display: flex; align-items: center; gap: 1rem; padding: .7rem 1.2rem .6rem; }
  h1 { font-family: "IBM Plex Mono", monospace; font-size: .95rem; font-weight: 700; letter-spacing: .32em; color: #3dd68c; text-shadow: 0 0 12px rgba(61,214,140,.4); }
  header .right { margin-left: auto; display: flex; gap: .7rem; align-items: center; }
  #clock { font-family: "IBM Plex Mono", monospace; font-size: .9rem; color: var(--dim); }
  #conn { font-size: .7rem; }
  #conn.on { color: var(--c-coding); } #conn.off { color: var(--c-waiting); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .2; } }

  .hbtn { background: none; border: 1px solid #38434d; border-radius: 5px; font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: .68rem; letter-spacing: .1em; padding: .35rem .7rem; color: var(--dim); transition: transform .15s, color .2s, border-color .2s; }
  .hbtn:hover { color: var(--c-coding); border-color: var(--c-coding); transform: translateY(-1px); }
  .hbtn:active { transform: scale(.94); }

  /* ================= カードグリッド ================= */
  #grid { position: relative; z-index: 1; padding: 1.2rem 1.8rem 2.4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.3rem; align-content: start; }
  #empty { grid-column: 1 / -1; padding: 5rem 1rem; text-align: center; color: var(--dim); font-size: .95rem; }
  #empty .zzz { font-size: 3rem; display: block; margin-bottom: 1rem; animation: boing 3s ease-in-out infinite; }

  .card {
    --c: var(--c-thinking);
    position: relative;
    display: flex; gap: 1rem; align-items: center;
    padding: 1.15rem 1.2rem;
    border-radius: 26px;
    background: linear-gradient(145deg, var(--card-hi), var(--card-lo));
    animation: appear .5s cubic-bezier(.34, 1.56, .64, 1) backwards;
    transition: transform .25s, opacity .4s, box-shadow .3s;
  }
  body[data-theme="clay"] .card {
    box-shadow:
      9px 9px 22px var(--sh-dark),
      -7px -7px 18px var(--sh-light),
      inset 2px 2px 6px rgba(255,255,255,.85),
      inset -3px -3px 8px rgba(185,160,125,.18);
  }
  /* 管制室: 1セッション=2行の高密度リスト（小さいウィンドウで数を見る用）
     1行目: プロジェクト｜状態｜n分前   2行目: 詳細｜host·ID */
  body[data-theme="ops"] .card { border-radius: 4px; border: 1px solid #1c242c; border-left: 3px solid var(--c); padding: .35rem .6rem; }
  body[data-theme="ops"] .avatar { display: none; }
  body[data-theme="ops"] #grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: .35rem; padding: .6rem 1rem; }
  body[data-theme="ops"] .info { display: grid; grid-template-columns: auto 1fr auto; column-gap: .55rem; row-gap: .12rem; align-items: baseline; }
  body[data-theme="ops"] .proj { grid-area: 1 / 1; font-size: .76rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 11em; }
  body[data-theme="ops"] .label { grid-area: 1 / 2; font-size: .7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  body[data-theme="ops"] .meta { display: contents; }
  body[data-theme="ops"] .meta .elapsed { grid-area: 1 / 3; font-family: "IBM Plex Mono", monospace; font-size: .58rem; color: var(--dim); }
  body[data-theme="ops"] .detail { grid-area: 2 / 1 / 2 / 3; font-size: .6rem; margin: 0; min-height: 0; }
  body[data-theme="ops"] .meta .sid { grid-area: 2 / 3; font-family: "IBM Plex Mono", monospace; font-size: .56rem; color: var(--faint); }
  body[data-theme="ops"] .card:hover { transform: none; }
  body[data-theme="ops"] .x { top: 50%; transform: translateY(-50%); width: 20px; height: 20px; font-size: .65rem; }
  body[data-theme="ops"] .card.active { box-shadow: -6px 0 24px -12px var(--c); }
  .card:hover { transform: translateY(-5px) rotate(-.4deg); }
  .card.gone { opacity: .4; }
  .card.pop { animation: pop .3s cubic-bezier(.34, 1.56, .64, 1); }
  @keyframes appear { from { opacity: 0; transform: scale(.8) translateY(16px); } }
  @keyframes pop { 50% { transform: scale(1.035); } }

  /* --- キャラクターアバター ---
     assets/avatars/<activity>.png があればキャラ画像（行動シーン）を表示、
     なければ絵文字にフォールバック。キャラは浮遊し、足元に影が落ちる。 */
  .avatar {
    width: 108px; height: 108px; flex-shrink: 0;
    position: relative;
    display: grid; place-items: center;
    border-radius: 28px;
    background: radial-gradient(circle at 32% 24%, #ffffff 0%, color-mix(in srgb, var(--c) 55%, #fff) 85%);
    overflow: visible;
  }
  body[data-theme="clay"] .avatar {
    box-shadow:
      5px 6px 12px var(--sh-dark),
      inset 3px 4px 6px rgba(255,255,255,.75),
      inset -4px -5px 10px rgba(0,0,0,.12);
  }
  body[data-theme="ops"] .avatar {
    border-radius: 10px;
    background: radial-gradient(circle at 32% 28%, #202a33 0%, #0c1014 80%);
    border: 2px solid var(--c); box-shadow: 0 0 14px -4px var(--c);
  }
  .avatar .pose {
    position: absolute; bottom: 6px;
    width: 112%; max-width: none;
    object-fit: contain;
    filter: drop-shadow(0 3px 4px rgba(90, 60, 30, .18));
    display: none;
    z-index: 2;
  }
  .avatar .ground {
    position: absolute; bottom: 4px; left: 50%;
    width: 62%; height: 12px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: rgba(90, 60, 30, .22);
    filter: blur(3px);
    display: none;
    z-index: 1;
  }
  body[data-theme="ops"] .avatar .ground { background: rgba(0, 0, 0, .55); }
  .avatar .emoji { font-size: 2.6rem; }
  /* 画像があるとき: キャラ表示・絵文字非表示 */
  .avatar.img .pose, .avatar.img .ground { display: block; }
  .avatar.img .emoji { display: none; }

  /* 活動中: 画像キャラはふわふわ浮遊（影が連動）、絵文字はぷにぷに */
  .card.active .avatar .pose { animation: hover-float 2.4s ease-in-out infinite; }
  .card.active .avatar .ground { animation: hover-shadow 2.4s ease-in-out infinite; }
  .card.active .avatar:not(.img) { animation: boing 1.7s ease-in-out infinite; }
  @keyframes hover-float {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-9px) rotate(1.2deg); }
  }
  @keyframes hover-shadow {
    0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
    50%      { transform: translateX(-50%) scaleX(.72); opacity: .55; }
  }
  @keyframes boing {
    0%, 100% { transform: translateY(0) scale(1, 1); }
    30%      { transform: translateY(-7px) scale(.96, 1.06); }
    50%      { transform: translateY(0) scale(1.05, .94); }
    65%      { transform: translateY(-2px) scale(.99, 1.02); }
  }

  .info { min-width: 0; flex: 1; }
  .proj { font-weight: 700; font-size: 1.02rem; margin-bottom: .1rem; }
  .label { font-weight: 700; font-size: .88rem; color: var(--c); filter: brightness(.92); }
  body[data-theme="ops"] .label { filter: none; }
  .detail { font-family: "IBM Plex Mono", monospace; font-size: .66rem; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: .25rem; min-height: 1em; }
  .meta { display: flex; gap: .9rem; font-size: .66rem; color: var(--dim); margin-top: .4rem; font-family: "IBM Plex Mono", monospace; }

  /* --- 個別クリア --- */
  .x {
    position: absolute; top: .7rem; right: .8rem;
    width: 26px; height: 26px; border-radius: 50%; border: none;
    font-size: .8rem; font-weight: 700; line-height: 1;
    color: var(--dim); background: var(--card-lo);
    opacity: 0; transition: opacity .2s, transform .15s, color .2s;
  }
  body[data-theme="clay"] .x { box-shadow: 2px 2px 5px var(--sh-dark), -2px -2px 5px var(--sh-light); }
  .card:hover .x { opacity: 1; }
  .x:hover { color: var(--c-waiting); transform: scale(1.15); }
  .x:active { transform: scale(.9); }

  /* ================= 3D バーチャルオフィス ================= */
  /* ミッドナイトロフト: オフィステーマ時はページ全体を夜に */
  body[data-theme="office"] {
    --bg: #1c2238; --text: #e6e2d6; --dim: #8a93b8;
    --card-hi: #1c2340; --card-lo: #151a30;
    --sh-dark: rgba(0, 0, 0, .55); --sh-light: rgba(255, 255, 255, .05);
  }
  body[data-theme="office"] #blobs { display: none; }
  #office { display: none; }
  body[data-theme="office"] #grid { display: none; }
  body[data-theme="office"] #office { display: block; }
  /* 部屋は画面全体の背景としてそのまま描く */
  #officeWrap { position: fixed; inset: 0; z-index: 0; }
  #officeWrap canvas { display: block; width: 100%; height: 100%; }

  /* ================= AI カンパニー（昼） ================= */
  /* company: 夜のオフィス。ヘッダー帯もシーンに合わせて濃色に */
  body[data-theme="company"] {
    --bg: #0e1322; --text: #e6e9f2; --dim: #9aa3c4;
    --card-hi: #1a2236; --card-lo: #121828;
    --sh-dark: rgba(0, 0, 0, .5); --sh-light: rgba(255, 255, 255, .04);
  }
  /* ヘッダー帯（3Dキャンバスの上の細い部分）を濃色に */
  body[data-theme="company"] header { background: #0e1322; }
  body[data-theme="company"] #blobs { display: none; }
  #company { display: none; }
  body[data-theme="company"] #grid { display: none; }
  body[data-theme="company"] #company { display: block; }
  #companyWrap { position: fixed; inset: 0; z-index: 0; }
  #companyWrap canvas { display: block; width: 100%; height: 100%; }

  /* Company: 吹き出しは HTML オーバーレイ（ベクター文字でくっきり） */
  #companyLabels { position: fixed; inset: 0; z-index: 4; pointer-events: none; display: none; }
  body[data-theme="company"] #companyLabels { display: block; }
  .clbl { position: absolute; left: 0; top: 0; will-change: transform; pointer-events: auto; cursor: pointer; }
  .clbl-in {
    position: relative; transform: translate(-50%, -100%);
    background: #fff; border-radius: 13px; padding: .34rem .55rem .44rem;
    box-shadow: 0 8px 22px rgba(0,0,0,.4); min-width: 92px; max-width: 240px;
    font-family: "Zen Maru Gothic", sans-serif;
  }
  .clbl-in::after {
    content: ''; position: absolute; left: 50%; bottom: -8px; transform: translateX(-50%);
    border: 8px solid transparent; border-top-color: #fff;
  }
  .clbl.wait .clbl-in { box-shadow: 0 8px 22px rgba(0,0,0,.4), 0 0 0 2.5px #ee5d5d; }
  .clbl-tag {
    display: inline-block; max-width: 100%; font-weight: 700; font-size: .68rem; line-height: 1.5;
    color: #fff; padding: .04rem .55rem; border-radius: 999px; margin-bottom: .18rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: bottom;
  }
  .clbl-status { display: flex; align-items: center; gap: .32rem; font-weight: 700; font-size: .82rem; }
  .clbl-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .clbl-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clbl-detail { font-size: .68rem; color: #6a7286; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: .12rem; }
  .clbl-bar { height: 6px; border-radius: 999px; background: #e6eaf2; margin-top: .32rem; overflow: hidden; }
  .clbl-bar i { display: block; height: 100%; border-radius: 999px; transition: width .4s; }

  /* Company: サイネージも HTML オーバーレイでくっきり */
  #companySign { position: fixed; z-index: 4; pointer-events: none; display: none; }
  body[data-theme="company"] #companySign { display: block; }
  .sign-in {
    width: 100%; height: 100%; box-sizing: border-box; overflow: hidden;
    background: linear-gradient(180deg, #1b2656, #0c1226);
    border-radius: .3em; padding: .2em .9em;
    display: flex; flex-direction: column; justify-content: center;
    font-family: "Baloo 2", "Zen Maru Gothic", sans-serif;
  }
  .sign-title { font-weight: 800; font-size: 1.55em; line-height: 1.05; white-space: nowrap; color: #4de3a8; text-shadow: 0 0 .3em rgba(77,227,168,.7); }
  .sign-stats { display: flex; gap: 1.1em; margin-top: .5em; font-family: "Zen Maru Gothic", sans-serif; font-weight: 700; font-size: 1.0em; }
  .sign-stats span { display: flex; align-items: center; color: #e8ecf8; white-space: nowrap; }
  .sign-stats span::before { content: ''; width: .55em; height: .55em; border-radius: 50%; margin-right: .38em; }
  .sign-stats .s-run::before { background: #58c98d; }
  .sign-stats .s-wait::before { background: #ee5d5d; }
  .sign-stats .s-seat::before { background: #9fb0d8; }

  /* セッション詳細パネル */
  #opanel {
    position: fixed; right: 20px; bottom: 20px; z-index: 5;
    width: 300px; padding: 1rem 1.1rem;
    background: rgba(20, 26, 46, .92); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.14); border-radius: 16px;
    color: #ece7da; font-size: .82rem;
  }
  #opanel[hidden] { display: none; }
  #opanel .op-head { display: flex; align-items: center; margin-bottom: .35rem; }
  #opanel .op-head b { font-size: 1rem; }
  #op-close { margin-left: auto; background: none; border: none; color: #8a93b8; font-size: .95rem; }
  #op-close:hover { color: #ff9090; }
  #op-status { font-weight: 700; margin-bottom: .35rem; }
  #op-detail {
    font-family: "IBM Plex Mono", monospace; font-size: .66rem; color: #9aa3c0;
    word-break: break-all; max-height: 3.2em; overflow: hidden; margin-bottom: .45rem; min-height: 1em;
  }
  #op-gauges { margin: .1rem 0 .6rem; }
  #op-gauges .g { margin-bottom: .5rem; }
  #op-gauges .g-top {
    display: flex; justify-content: space-between;
    font-size: .64rem; color: #b8c0dc; margin-bottom: .2rem;
  }
  #op-gauges .g-top b { font-weight: 700; }
  #op-gauges .g-top span { font-family: "IBM Plex Mono", monospace; color: #8a93b8; }
  #op-gauges .bar { height: 7px; border-radius: 999px; background: rgba(255,255,255,.09); overflow: hidden; }
  #op-gauges .fill { height: 100%; border-radius: 999px; transition: width .5s ease, background .3s; }
  #op-gauges .none { font-size: .62rem; color: #6a739a; font-family: "IBM Plex Mono", monospace; }
  #op-subs { margin-bottom: .6rem; }
  #op-subs .s-title { font-size: .62rem; color: #8a93b8; margin-bottom: .3rem; letter-spacing: .05em; }
  #op-subs .s-row { display: flex; align-items: baseline; gap: .4rem; font-size: .68rem; padding: .12rem 0; }
  #op-subs .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  #op-subs .s-dot.run { background: var(--c-delegating); box-shadow: 0 0 6px var(--c-delegating); animation: blink 1.1s steps(2) infinite; }
  #op-subs .s-dot.done { background: #4a5478; }
  #op-subs .s-type { font-family: "IBM Plex Mono", monospace; font-size: .6rem; color: #c9a7f0; flex-shrink: 0; }
  #op-subs .s-desc { color: #b8c0dc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #op-subs .s-row.done .s-desc, #op-subs .s-row.done .s-type { opacity: .5; }
  #op-meta { font-family: "IBM Plex Mono", monospace; font-size: .64rem; color: #6a739a; margin-bottom: .7rem; }
  .op-actions { display: flex; gap: .5rem; }
  .op-actions button {
    flex: 1; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.07);
    color: #ece7da; border-radius: 8px; padding: .4rem .3rem; font-size: .72rem; font-weight: 700;
  }
  .op-actions button:hover { background: rgba(255,255,255,.16); }
  #op-dismiss:hover { color: #ff9090; }

  /* ================= Feed ドロワー ================= */
  #feedDrawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 6;
    width: 330px; display: flex; flex-direction: column;
    background: rgba(16, 21, 38, .94); backdrop-filter: blur(10px);
    border-left: 1px solid rgba(255,255,255,.12);
    animation: slidein .25s ease;
  }
  #feedDrawer[hidden] { display: none; }
  @keyframes slidein { from { transform: translateX(100%); } }
  .fd-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: .9rem 1rem .6rem; color: #8a93b8;
    font-family: "IBM Plex Mono", monospace; font-size: .7rem; letter-spacing: .25em;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  #feedClose { background: none; border: none; color: #8a93b8; font-size: .9rem; }
  #feedClose:hover { color: #ff9090; }
  #feedRows { overflow-y: auto; flex: 1; padding: .4rem 0; }
  #feedRows::-webkit-scrollbar { width: 4px; }
  #feedRows::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); }
  .frow {
    padding: .3rem 1rem; font-size: .68rem; color: #d5dae8;
    display: grid; grid-template-columns: 50px 1fr; gap: .5rem; align-items: baseline;
  }
  .frow .ft { font-family: "IBM Plex Mono", monospace; font-size: .6rem; color: #5c6588; }
  .frow .fp { color: #8a93b8; margin-right: .35em; }
  .frow .fl { color: var(--fc, #d5dae8); font-weight: 700; }
  .frow .fd {
    display: block; font-family: "IBM Plex Mono", monospace; font-size: .58rem; color: #5c6588;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ================= ビュー選択 ================= */
  #picker {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, rgba(30,40,66,.55), rgba(8,11,20,.82));
    backdrop-filter: blur(12px);
  }
  #picker[hidden] { display: none; }
  .pk-panel { animation: appear .4s cubic-bezier(.34,1.56,.64,1) backwards; }
  .pk-head { text-align: center; margin-bottom: 1.6rem; }
  .pk-head h2 {
    font-family: "IBM Plex Mono", monospace; font-size: 1rem; font-weight: 700;
    letter-spacing: .4em; color: #e6e2d6; margin-bottom: .5rem;
  }
  .pk-head p { font-size: .74rem; color: #8a93b8; }
  .pk-cards { display: flex; gap: 1.4rem; }
  .pick {
    width: 260px; padding: 1rem 1rem 1.15rem; cursor: pointer; text-align: left;
    border-radius: 20px; border: 1px solid rgba(255,255,255,.1);
    background: linear-gradient(160deg, rgba(28,35,58,.9), rgba(18,23,40,.9));
    transition: transform .22s, border-color .22s, box-shadow .22s;
    animation: appear .5s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .pick:nth-child(2) { animation-delay: .07s; }
  .pick:hover { transform: translateY(-6px); border-color: rgba(61,214,140,.55); box-shadow: 0 18px 40px -18px rgba(61,214,140,.5); }
  .pick.active { border-color: rgba(61,214,140,.8); }
  .pick.active .pk-name::after { content: " ●"; color: #3dd68c; font-size: .6rem; vertical-align: middle; }
  .pk-prev { height: 128px; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: .8rem; }
  /* Office プレビュー: 夜のオフィスの光 */
  .pk-prev-office { background: linear-gradient(165deg, #2a3350 0%, #1a2138 60%, #141a2e 100%); }
  .pk-prev-office::before {
    content: ""; position: absolute; left: 14%; bottom: 0; width: 72%; height: 34%;
    background: linear-gradient(180deg, transparent, rgba(255,190,120,.16));
  }
  .pk-prev-office span { position: absolute; border-radius: 50%; filter: blur(1px); }
  .pk-prev-office span:nth-child(1) { width: 40px; height: 40px; background: radial-gradient(circle at 35% 30%, #fff, #ffbe78); top: 26px; left: 40px; box-shadow: 0 0 22px #ffab5c; }
  .pk-prev-office span:nth-child(2) { width: 10px; height: 10px; background: #7ef2a0; top: 20px; right: 34px; box-shadow: 0 0 12px #7ef2a0; }
  .pk-prev-office span:nth-child(3) { width: 8px; height: 8px; background: #f8a8c8; bottom: 30px; right: 54px; box-shadow: 0 0 10px #f8a8c8; }
  /* Company プレビュー: 昼のオフィス + サイネージ + ロボット */
  .pk-prev-company { background: linear-gradient(165deg, #f0f5fc 0%, #dde6f2 55%, #ccd7e6 100%); }
  .pk-prev-company::before {
    content: ""; position: absolute; top: 12px; left: 17%; width: 66%; height: 27%;
    border-radius: 6px; background: #141c3c; box-shadow: 0 0 16px rgba(77, 227, 168, .55);
  }
  .pk-prev-company::after {
    content: ""; position: absolute; left: 24%; bottom: 0; width: 52%; height: 30%;
    background: linear-gradient(180deg, transparent, rgba(95, 155, 214, .25));
  }
  .pk-prev-company span { position: absolute; border-radius: 50%; }
  .pk-prev-company span:nth-child(1) { width: 18px; height: 18px; background: #58c98d; bottom: 26px; left: 34px; box-shadow: 0 3px 6px rgba(90,110,140,.4); }
  .pk-prev-company span:nth-child(2) { width: 15px; height: 15px; background: #8f7ae8; bottom: 40px; right: 44px; box-shadow: 0 3px 6px rgba(90,110,140,.4); }
  .pk-prev-company span:nth-child(3) { width: 13px; height: 13px; background: #f0a05e; bottom: 18px; right: 84px; box-shadow: 0 3px 6px rgba(90,110,140,.4); }
  .pick:nth-child(3) { animation-delay: .14s; }
  /* Console プレビュー: 高密度リストの行 */
  .pk-prev-ops { background: linear-gradient(160deg, #0c1014, #070a0d); padding: 12px; display: flex; flex-direction: column; gap: 7px; }
  .pk-prev-ops i { display: block; height: 12px; border-radius: 3px; border-left: 3px solid var(--pc, #3dd68c); background: rgba(255,255,255,.05); }
  .pk-prev-ops i:nth-child(1) { --pc: #3dd68c; width: 94%; }
  .pk-prev-ops i:nth-child(2) { --pc: #ffb454; width: 82%; }
  .pk-prev-ops i:nth-child(3) { --pc: #4cc3ff; width: 90%; }
  .pk-prev-ops i:nth-child(4) { --pc: #ff5c8a; width: 74%; }
  .pk-name { font-family: "IBM Plex Mono", monospace; font-size: 1.05rem; font-weight: 700; color: #f0ece0; letter-spacing: .05em; }
  .pk-desc { font-size: .72rem; color: #8a93b8; margin-top: .25rem; }
</style>
</head>
<body data-theme="office">

<div id="blobs"><i></i><i></i><i></i></div>

<header>
  <h1 id="logo">AGENT OPS</h1>
  <div class="right">
    <button id="feedBtn" class="hbtn">Feed</button>
    <button id="themeBtn" class="hbtn">テーマ</button>
    <button id="clearAll" class="hbtn">All Clear</button>
    <span id="conn" class="off">●</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<main id="grid">
  <div id="empty">
    <span class="zzz">💤</span>
    まだ誰もいないよ。新しいセッションを始めるとここに現れます
  </div>
</main>

<section id="office">
  <div id="officeWrap"></div>
</section>

<section id="company">
  <div id="companyWrap"></div>
</section>
<div id="companyLabels"></div>
<div id="companySign"><div class="sign-in">
  <div class="sign-title">AGENT OPS Inc.</div>
  <div class="sign-stats"></div>
</div></div>

<div id="opanel" hidden>
  <div class="op-head"><b id="op-proj"></b><button id="op-close">✕</button></div>
  <div id="op-status"></div>
  <div id="op-detail"></div>
  <div id="op-gauges"></div>
  <div id="op-subs"></div>
  <div id="op-meta"></div>
  <div class="op-actions">
    <button id="op-open">エディタで開く</button>
    <button id="op-dismiss">消す</button>
  </div>
</div>

<aside id="feedDrawer" hidden>
  <div class="fd-head">LIVE FEED <button id="feedClose">✕</button></div>
  <div id="feedRows"></div>
</aside>

<div id="picker" hidden>
  <div class="pk-panel">
    <div class="pk-head">
      <h2>SELECT VIEW</h2>
      <p>セッションの見せ方を選べます・後からいつでも切り替えできます</p>
    </div>
    <div class="pk-cards">
      <button class="pick" data-t="office">
        <div class="pk-prev pk-prev-office"><span></span><span></span><span></span></div>
        <div class="pk-name">Office</div>
        <div class="pk-desc">夜のロフトでキャラクターが働く</div>
      </button>
      <button class="pick" data-t="company">
        <div class="pk-prev pk-prev-company"><span></span><span></span><span></span></div>
        <div class="pk-name">Company</div>
        <div class="pk-desc">昼のAIカンパニーでロボット社員が働く</div>
      </button>
      <button class="pick" data-t="ops">
        <div class="pk-prev pk-prev-ops"><i></i><i></i><i></i><i></i></div>
        <div class="pk-name">Console</div>
        <div class="pk-desc">高密度リストで数を一覧</div>
      </button>
    </div>
  </div>
</div>

<script type="module" src="/assets/office.js"></script>
<script type="module" src="/assets/company.js"></script>
<script>
const COLORS = ['coding','reading','searching','running','delegating','planning','thinking','waiting','idle','ended'];
const EMOJI = {
  coding: '⌨️', reading: '📖', searching: '🔍', running: '⚙️', delegating: '🤝',
  planning: '📝', thinking: '💭', waiting: '🙋', idle: '😴', ended: '👋',
};
const ACTIVE = new Set(['coding','reading','searching','running','delegating','planning','thinking']);
const sessions = new Map();
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');

function fmtTime(ts) { return new Date(ts).toTimeString().slice(0, 8); }
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + '秒';
  if (s < 3600) return Math.floor(s / 60) + '分';
  return Math.floor(s / 3600) + '時間' + Math.floor((s % 3600) / 60) + '分';
}

function renderSession(s) {
  let el = document.getElementById('s-' + s.session_id);
  const fresh = !el;
  if (fresh) {
    el = document.createElement('div');
    el.id = 's-' + s.session_id;
    el.className = 'card';
    el.innerHTML = `
      <button class="x" title="このカードを消す">✕</button>
      <div class="avatar">
        <i class="ground"></i>
        <img class="pose" alt="">
        <span class="emoji"></span>
      </div>
      <div class="info">
        <div class="proj"></div>
        <div class="label"></div>
        <div class="detail"></div>
        <div class="meta"><span class="elapsed"></span><span class="sid"></span></div>
      </div>`;
    el.querySelector('.x').onclick = (e) => {
      e.stopPropagation();
      fetch('/clear-session', { method: 'POST', body: JSON.stringify({ session_id: s.session_id }) });
    };
    el.onclick = () => showSessionPanel(s.session_id);                 // クリック = 詳細パネル
    el.ondblclick = () => focusSession(s.session_id);                  // ダブルクリック = エディタへ
    el.style.cursor = 'pointer';
  }
  el.style.setProperty('--c', `var(--c-${COLORS.includes(s.activity) ? s.activity : 'thinking'})`);
  el.classList.toggle('active', ACTIVE.has(s.activity));
  el.classList.toggle('gone', s.activity === 'ended');
  el.querySelector('.emoji').textContent = EMOJI[s.activity] || '💭';
  setPose(el.querySelector('.avatar'), s.activity);
  el.querySelector('.proj').textContent = s.project;
  el.querySelector('.label').textContent = s.label;
  el.querySelector('.detail').textContent = s.detail || '';
  el.querySelector('.sid').textContent = (s.host ? s.host + ' · ' : '') + s.session_id.slice(0, 8);
  el.dataset.updated = s.updated_at;
  grid.prepend(el); // 最新更新を先頭へ
  if (!fresh) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  empty.style.display = sessions.size ? 'none' : '';
}

function removeSession(id) {
  sessions.delete(id);
  document.getElementById('s-' + id)?.remove();
  window.Office?.remove(id);
  window.Company?.remove(id);
  if (panelForId === id) hideSessionPanel();
  empty.style.display = sessions.size ? 'none' : '';
}

// assets/avatars/<activity>.png があればキャラ画像に切替（無ければ絵文字のまま）
const poseAvailable = new Map(); // activity -> true/false（一度調べたら記憶）
function setPose(avatar, activity) {
  const img = avatar.querySelector('.pose');
  if (poseAvailable.get(activity) === false) { avatar.classList.remove('img'); return; }
  img.onload = () => { poseAvailable.set(activity, true); avatar.classList.add('img'); };
  img.onerror = () => { poseAvailable.set(activity, false); avatar.classList.remove('img'); };
  const src = `/assets/avatars/${activity}.png`;
  if (img.getAttribute('src') !== src) img.src = src;
  else if (poseAvailable.get(activity)) avatar.classList.add('img');
}

function apply(s) {
  sessions.set(s.session_id, s);
  renderSession(s);
  window.Office?.upsert(s);
  window.Company?.upsert(s);
  if (panelForId === s.session_id) showSessionPanel(s.session_id); // パネル表示中なら追従更新
}
// 3D モジュールの読込完了が SSE より遅れた場合の同期
window.addEventListener('office-ready', () => sessions.forEach((s) => window.Office.upsert(s)));
window.addEventListener('company-ready', () => sessions.forEach((s) => window.Company.upsert(s)));
// 3秒待っても 3D エンジンが来なければヒント欄に知らせる
setTimeout(() => {
  if (!window.Office) {
    const hint = document.getElementById('officeHint');
    if (hint) hint.textContent = '⚠ 3Dエンジンの読み込みに失敗しました（ネット接続と assets/office.js を確認）';
  }
}, 3000);

function resetUI() {
  sessions.clear();
  grid.querySelectorAll('.card').forEach((el) => el.remove());
  window.Office?.reset();
  window.Company?.reset();
  hideSessionPanel();
  empty.style.display = '';
}

document.getElementById('clearAll').onclick = () => fetch('/clear', { method: 'POST' });

// --- セッション詳細パネル（バーチャルオフィス / 管制室 共通） ---
const opanel = document.getElementById('opanel');
let panelForId = null;
function showSessionPanel(id) {
  const s = sessions.get(id);
  if (!s) return;
  panelForId = id;
  opanel.querySelector('#op-proj').textContent = s.project || '';
  const st = opanel.querySelector('#op-status');
  st.textContent = s.label || '';
  st.style.color = `var(--c-${COLORS.includes(s.activity) ? s.activity : 'thinking'})`;
  opanel.querySelector('#op-detail').textContent = s.detail || '';
  renderGauges(s.tokens);
  renderSubs(s.subagents);
  opanel.querySelector('#op-meta').textContent =
    `${s.host ? s.host + ' · ' : ''}${s.session_id.slice(0, 8)} · ${fmtElapsed(Date.now() - s.updated_at)}前`;
  opanel.hidden = false;
}
const kfmt = (n) =>
  n >= 1e6 ? (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'
  : n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k'
  : String(n);
function renderGauges(tok) {
  const box = opanel.querySelector('#op-gauges');
  if (!tok) { box.innerHTML = '<div class="none">トークン情報なし（リモートセッション等）</div>'; return; }
  let html = '';
  if (tok.ctx > 0) { // コンテキスト量が取れる場合だけバーを出す（Codex は累計のみ）
    const pct = Math.min(100, Math.round((tok.ctx / tok.ctxMax) * 100));
    const color = pct < 70 ? 'var(--c-coding)' : pct < 90 ? 'var(--c-planning)' : 'var(--c-waiting)';
    html += `<div class="g">
      <div class="g-top"><b>コンテキスト</b><span>${kfmt(tok.ctx)} / ${kfmt(tok.ctxMax)} (${pct}%)</span></div>
      <div class="bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }
  if (tok.out > 0) html += `<div class="g"><div class="g-top"><b>累計トークン</b><span>${kfmt(tok.out)}</span></div></div>`;
  box.innerHTML = html;
}
function renderSubs(subs) {
  const box = opanel.querySelector('#op-subs');
  if (!subs || !subs.length) { box.innerHTML = ''; return; }
  const running = subs.filter((s) => s.status === 'running').length;
  const rows = subs.slice().reverse().map((s) => `
    <div class="s-row ${s.status}">
      <span class="s-dot ${s.status === 'running' ? 'run' : 'done'}"></span>
      <span class="s-type">${s.type}</span>
      <span class="s-desc">${(s.desc || '').replace(/</g, '&lt;')}</span>
    </div>`).join('');
  box.innerHTML = `<div class="s-title">サブエージェント（稼働 ${running} / 計 ${subs.length}）</div>${rows}`;
}
function hideSessionPanel() { panelForId = null; opanel.hidden = true; }
window.showSessionPanel = showSessionPanel;
window.hideSessionPanel = hideSessionPanel;
const focusSession = (id) => fetch('/focus-session', { method: 'POST', body: JSON.stringify({ session_id: id }) });
opanel.querySelector('#op-close').onclick = hideSessionPanel;
opanel.querySelector('#op-open').onclick = async () => {
  if (!panelForId) return;
  const btn = opanel.querySelector('#op-open');
  const r = await focusSession(panelForId);
  if (!r.ok) {
    btn.textContent = r.status === 409 ? 'リモートのため開けません' : '開けませんでした';
    setTimeout(() => (btn.textContent = 'エディタで開く'), 2000);
  }
};
opanel.querySelector('#op-dismiss').onclick = () => {
  if (!panelForId) return;
  fetch('/clear-session', { method: 'POST', body: JSON.stringify({ session_id: panelForId }) });
  hideSessionPanel();
};

// --- Feed ドロワー ---
const feedDrawer = document.getElementById('feedDrawer');
const feedRows = document.getElementById('feedRows');
const feedBtn = document.getElementById('feedBtn');
feedBtn.onclick = (e) => { e.stopPropagation(); feedDrawer.hidden = !feedDrawer.hidden; };
document.getElementById('feedClose').onclick = () => (feedDrawer.hidden = true);
// ドロワーの外側をクリックしたら閉じる（ドロワー内クリックは伝播させない）
feedDrawer.addEventListener('click', (e) => e.stopPropagation());
document.addEventListener('click', () => { if (!feedDrawer.hidden) feedDrawer.hidden = true; });
function pushFeed(e) {
  const row = document.createElement('div');
  row.className = 'frow';
  row.style.setProperty('--fc', `var(--c-${COLORS.includes(e.activity) ? e.activity : 'thinking'})`);
  const proj = (e.host ? e.host + ':' : '') + (e.cwd ? e.cwd.split('/').pop() : '');
  row.innerHTML = `
    <span class="ft">${fmtTime(e.ts)}</span>
    <span><span class="fp">${proj}</span><span class="fl">${e.label}</span>
    <span class="fd">${(e.detail || '').replace(/</g, '&lt;')}</span></span>`;
  feedRows.prepend(row);
  while (feedRows.children.length > 150) feedRows.lastChild.remove();
}

// --- ビュー（テーマ）選択 ---
const picker = document.getElementById('picker');
const picks = [...document.querySelectorAll('.pick')];
function setTheme(t) {
  document.body.dataset.theme = t;
  localStorage.setItem('agentops-theme', t);
  picks.forEach((b) => b.classList.toggle('active', b.dataset.t === t));
  picker.hidden = true;
}
function openPicker() {
  picks.forEach((b) => b.classList.toggle('active', b.dataset.t === document.body.dataset.theme));
  picker.hidden = false;
}
picks.forEach((b) => (b.onclick = () => setTheme(b.dataset.t)));
document.getElementById('themeBtn').onclick = openPicker;
// パネル外クリックで閉じる
picker.addEventListener('click', (e) => { if (e.target === picker) picker.hidden = true; });
const THEMES = ['ops', 'company', 'office'];
const urlTheme = new URLSearchParams(location.search).get('view'); // ?view=company で直接指定可
const saved = localStorage.getItem('agentops-theme');
setTheme(THEMES.includes(urlTheme) ? urlTheme : THEMES.includes(saved) ? saved : 'office'); // 既定は Office

// --- SSE ---
const conn = document.getElementById('conn');
const es = new EventSource('/stream');
es.onopen = () => { conn.className = 'on'; };
es.onerror = () => { conn.className = 'off'; };
es.onmessage = (m) => {
  const msg = JSON.parse(m.data);
  if (msg.type === 'snapshot') {
    resetUI(); feedRows.innerHTML = '';
    msg.sessions.forEach(apply);
    (msg.events || []).forEach(pushFeed);
  }
  else if (msg.type === 'update') { apply(msg.session); pushFeed(msg.event); }
  else if (msg.type === 'clear') { resetUI(); feedRows.innerHTML = ''; }
  else if (msg.type === 'remove_session') removeSession(msg.session_id);
};

// --- 時計と経過時間 ---
setInterval(() => {
  document.getElementById('clock').textContent = fmtTime(Date.now());
  for (const s of sessions.values()) {
    const el = document.getElementById('s-' + s.session_id);
    if (!el) continue;
    el.querySelector('.elapsed').textContent = fmtElapsed(Date.now() - s.updated_at) + '前';
    if (Date.now() - s.updated_at > 20 * 60 * 1000) el.classList.add('gone');
  }
}, 1000);
</script>
</body>
</html>
