<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENT OPS — エージェント監視室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090b;
    --panel: #0d1114;
    --panel-2: #10161b;
    --line: #1c242c;
    --text: #d7dee5;
    --dim: #5c6a76;
    --faint: #38434d;

    --c-coding:     #3dd68c;
    --c-reading:    #4cc3ff;
    --c-searching:  #ffb454;
    --c-running:    #ff8a5c;
    --c-delegating: #ff5c8a;
    --c-planning:   #ffd866;
    --c-thinking:   #8fa3b8;
    --c-waiting:    #ff5c5c;
    --c-idle:       #45525e;
    --c-ended:      #2c353e;

    font-size: 15px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Zen Kaku Gothic New", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* CRT scanlines + vignette */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background:
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,.13) 2px 4px),
      radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(0,0,0,.5) 100%);
  }
  .mono { font-family: "IBM Plex Mono", monospace; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: baseline; gap: 1.2rem;
    padding: 1.1rem 1.6rem .9rem;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0c1116, var(--bg));
  }
  header h1 {
    font-family: "IBM Plex Mono", monospace;
    font-size: 1.05rem; font-weight: 600; letter-spacing: .35em;
    color: var(--c-coding);
    text-shadow: 0 0 12px rgba(61,214,140,.45);
  }
  header .sub { font-size: .78rem; color: var(--dim); letter-spacing: .2em; }
  header .right { margin-left: auto; display: flex; gap: 1.4rem; align-items: baseline; }
  #clock { font-family: "IBM Plex Mono", monospace; font-size: .95rem; color: var(--text); }
  #conn { font-family: "IBM Plex Mono", monospace; font-size: .72rem; letter-spacing: .15em; }
  #conn.on  { color: var(--c-coding); }
  #conn.off { color: var(--c-waiting); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  #clear {
    font-family: "IBM Plex Mono", monospace; font-size: .62rem; letter-spacing: .18em;
    background: none; border: 1px solid var(--faint); border-radius: 3px;
    color: var(--dim); padding: .2rem .55rem; cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  #clear:hover { color: var(--c-waiting); border-color: var(--c-waiting); }

  /* ---------- layout ---------- */
  .wrap {
    display: grid; grid-template-columns: 1fr 340px; gap: 0;
    min-height: calc(100vh - 58px);
  }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }

  /* ---------- session grid ---------- */
  #grid {
    padding: 1.4rem 1.6rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 1rem; align-content: start;
  }
  #empty {
    grid-column: 1 / -1; padding: 4rem 1rem; text-align: center;
    color: var(--faint); font-size: .85rem; letter-spacing: .1em;
  }
  #empty .big { font-family: "IBM Plex Mono", monospace; font-size: 1.1rem; margin-bottom: .8rem; color: var(--dim); }

  .card {
    --c: var(--c-thinking);
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-left: 3px solid var(--c);
    border-radius: 6px;
    padding: .95rem 1.05rem .85rem;
    position: relative;
    animation: reveal .45s cubic-bezier(.2,.9,.3,1) backwards;
    transition: border-color .4s, box-shadow .4s, opacity .4s;
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  .card.active { box-shadow: -6px 0 24px -12px var(--c); }
  .card.gone { opacity: .35; }
  @keyframes reveal { from { opacity: 0; transform: translateY(10px); } }

  .card .top { display: flex; align-items: center; gap: .6rem; margin-bottom: .65rem; }
  .badge {
    font-family: "IBM Plex Mono", monospace; font-size: .62rem; font-weight: 600;
    letter-spacing: .18em; padding: .18rem .45rem; border-radius: 3px;
    border: 1px solid var(--faint); color: var(--dim);
  }
  .badge.claude { border-color: #b0703a; color: #e0904f; }
  .badge.codex  { border-color: #4a7a9c; color: #6fb3dd; }
  .card .proj { font-weight: 700; font-size: .95rem; letter-spacing: .03em; }
  .card .sid {
    margin-left: auto; font-family: "IBM Plex Mono", monospace;
    font-size: .65rem; color: var(--faint);
  }

  .card .act { display: flex; align-items: center; gap: .55rem; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--c); box-shadow: 0 0 8px var(--c);
    flex-shrink: 0;
  }
  .card.active .dot { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.6); opacity: .55; } }
  .act .label { font-size: 1.12rem; font-weight: 700; color: var(--c); letter-spacing: .02em; }

  .card .detail {
    margin: .5rem 0 .7rem; font-family: "IBM Plex Mono", monospace;
    font-size: .72rem; color: var(--dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-height: 1.1em;
  }
  .card .meta {
    display: flex; gap: 1.1rem;
    font-family: "IBM Plex Mono", monospace; font-size: .68rem; color: var(--faint);
    border-top: 1px solid var(--line); padding-top: .55rem;
  }
  .card .meta .elapsed { color: var(--dim); }

  /* ---------- live feed ---------- */
  #feedWrap {
    border-left: 1px solid var(--line);
    background: var(--panel);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 58px); position: sticky; top: 0;
  }
  #feedWrap h2 {
    font-family: "IBM Plex Mono", monospace; font-size: .7rem; font-weight: 600;
    letter-spacing: .3em; color: var(--dim);
    padding: .9rem 1.1rem .7rem; border-bottom: 1px solid var(--line);
  }
  #feed { overflow-y: auto; padding: .4rem 0; flex: 1; }
  #feed::-webkit-scrollbar { width: 4px; }
  #feed::-webkit-scrollbar-thumb { background: var(--faint); }
  .row {
    display: grid; grid-template-columns: 52px 10px 1fr; gap: .5rem;
    padding: .32rem 1.1rem; font-size: .72rem; align-items: baseline;
    animation: reveal .3s backwards;
  }
  .row .t  { font-family: "IBM Plex Mono", monospace; color: var(--faint); font-size: .66rem; }
  .row .m  { width: 7px; height: 7px; border-radius: 50%; background: var(--c, var(--dim)); align-self: center; }
  .row .b .l { color: var(--text); }
  .row .b .d {
    font-family: "IBM Plex Mono", monospace; color: var(--faint); font-size: .64rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
  }
  .row .b .p { color: var(--dim); font-size: .64rem; margin-right: .4em; }
</style>
</head>
<body>

<header>
  <h1>AGENT OPS</h1>
  <span class="sub">エージェント監視室 / PHASE 1</span>
  <div class="right">
    <button id="clear" title="表示とサーバー上の履歴をクリア">CLEAR</button>
    <span id="conn" class="off">● CONNECTING</span>
    <span id="clock" class="mono">--:--:--</span>
  </div>
</header>

<div class="wrap">
  <main id="grid">
    <div id="empty">
      <div class="big">NO ACTIVE SESSIONS</div>
      新しい Claude Code セッションを開始すると、ここにカードが現れます
    </div>
  </main>
  <aside id="feedWrap">
    <h2>LIVE FEED</h2>
    <div id="feed"></div>
  </aside>
</div>

<script>
const COLORS = {
  coding: 'var(--c-coding)', reading: 'var(--c-reading)', searching: 'var(--c-searching)',
  running: 'var(--c-running)', delegating: 'var(--c-delegating)', planning: 'var(--c-planning)',
  thinking: 'var(--c-thinking)', waiting: 'var(--c-waiting)', idle: 'var(--c-idle)', ended: 'var(--c-ended)',
};
const ACTIVE = new Set(['coding','reading','searching','running','delegating','planning','thinking']);
const sessions = new Map();
const grid = document.getElementById('grid');
const feed = document.getElementById('feed');
const empty = document.getElementById('empty');

function fmtTime(ts) {
  return new Date(ts).toTimeString().slice(0, 8);
}
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h' + Math.floor((s % 3600) / 60) + 'm';
}

function renderSession(s) {
  let el = document.getElementById('s-' + s.session_id);
  if (!el) {
    el = document.createElement('div');
    el.id = 's-' + s.session_id;
    el.className = 'card';
    el.innerHTML = `
      <div class="top">
        <span class="badge"></span>
        <span class="proj"></span>
        <span class="sid"></span>
      </div>
      <div class="act"><span class="dot"></span><span class="label"></span></div>
      <div class="detail"></div>
      <div class="meta">
        <span class="elapsed"></span>
        <span class="count"></span>
      </div>`;
    grid.prepend(el);
  }
  el.style.setProperty('--c', COLORS[s.activity] || 'var(--c-thinking)');
  el.classList.toggle('active', ACTIVE.has(s.activity));
  el.classList.toggle('gone', s.activity === 'ended');
  el.querySelector('.badge').textContent = s.source.toUpperCase();
  el.querySelector('.badge').className = 'badge ' + s.source;
  el.querySelector('.proj').textContent = s.project;
  el.querySelector('.sid').textContent =
    (s.host ? s.host + ' · ' : '') + s.session_id.slice(0, 8);
  el.querySelector('.label').textContent = s.label;
  el.querySelector('.detail').textContent = s.detail || '';
  el.querySelector('.count').textContent = s.event_count + ' events';
  el.dataset.updated = s.updated_at;
  empty.style.display = sessions.size ? 'none' : '';
  grid.prepend(el); // 最新更新を先頭へ
}

function renderEvent(e) {
  const row = document.createElement('div');
  row.className = 'row';
  row.style.setProperty('--c', COLORS[e.activity] || 'var(--dim)');
  const proj = (e.host ? e.host + ':' : '') + (e.cwd ? e.cwd.split('/').pop() : '');
  row.innerHTML = `
    <span class="t">${fmtTime(e.ts)}</span>
    <span class="m"></span>
    <span class="b">
      <span class="p">${proj}</span><span class="l">${e.label}</span>
      <span class="d">${(e.detail || '').replace(/</g, '&lt;')}</span>
    </span>`;
  feed.prepend(row);
  while (feed.children.length > 120) feed.lastChild.remove();
}

function apply(s) { sessions.set(s.session_id, s); renderSession(s); }

// 画面を空にする（再接続時のスナップショット反映前と CLEAR 時に使う）
function resetUI() {
  sessions.clear();
  grid.querySelectorAll('.card').forEach((el) => el.remove());
  feed.innerHTML = '';
  empty.style.display = '';
}

document.getElementById('clear').onclick = () => fetch('/clear', { method: 'POST' });

// --- SSE ---
const conn = document.getElementById('conn');
function connect() {
  const es = new EventSource('/stream');
  es.onopen = () => { conn.textContent = '● LIVE'; conn.className = 'on'; };
  es.onerror = () => { conn.textContent = '● OFFLINE'; conn.className = 'off'; };
  es.onmessage = (m) => {
    const msg = JSON.parse(m.data);
    if (msg.type === 'snapshot') {
      resetUI();
      msg.sessions.forEach(apply);
      msg.events.forEach(renderEvent);
    } else if (msg.type === 'update') {
      apply(msg.session);
      renderEvent(msg.event);
    } else if (msg.type === 'clear') {
      resetUI();
    }
  };
}
connect();

// --- timers ---
setInterval(() => {
  document.getElementById('clock').textContent = fmtTime(Date.now());
  for (const s of sessions.values()) {
    const el = document.getElementById('s-' + s.session_id);
    if (!el) continue;
    el.querySelector('.elapsed').textContent = fmtElapsed(Date.now() - s.updated_at) + ' 前';
    // 20分イベントなし → 消えたとみなして暗く
    if (Date.now() - s.updated_at > 20 * 60 * 1000) el.classList.add('gone');
  }
}, 1000);
</script>
</body>
</html>
